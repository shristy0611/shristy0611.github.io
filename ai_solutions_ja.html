    <link rel="stylesheet" href="css/vendor.css">

    <style>
        .ai-solutions-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
            padding: 2rem;
        }
        .solution-item {
            position: relative;
            border-radius: 15px;
            overflow: hidden;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .solution-item:hover {
            transform: translateY(-10px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }
        .solution-icon {
            width: 60px;
            height: 60px;
            margin: 2rem auto;
            background: linear-gradient(45deg, #00f2fe, #4facfe);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .solution-content {
            padding: 1.5rem;
            color: white;
            text-align: center;
        }
        .features-list {
            text-align: left;
            margin-top: 1rem;
            padding-left: 1.5rem;
        }
        .features-list li {
            margin-bottom: 0.5rem;
            position: relative;
        }
        .features-list li::before {
            content: "•";
            color: #4facfe;
            position: absolute;
            left: -1rem;
        }
        .section-title {
            text-align: center;
            margin: 4rem 0;
            color: white;
        }
        .solution-cta {
            display: inline-block;
            margin-top: 1.5rem;
            padding: 0.75rem 1.5rem;
            background: linear-gradient(45deg, #00f2fe, #4facfe);
            border-radius: 25px;
            color: white;
            text-decoration: none;
            transition: transform 0.3s ease;
        }
        .solution-cta:hover {
            transform: scale(1.05);
        }
        body {
            background: linear-gradient(135deg, #000000, #1a1a1a);
        }
    </style>
</head>
